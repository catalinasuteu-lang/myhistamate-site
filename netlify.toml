# Netlify config — MyHistamate landing page
# Static site, no build step. Deploy this folder as the publish directory.

[build]
  publish = "."

# Domain-based language routing: .com -> English (/en/), .ro -> Romanian (root)
[[edge_functions]]
  path = "/*"
  function = "domain-lang"
  excludedPath = ["/assets/*", "/brand/*", "/admin/*", "/*.js", "/*.css", "/*.json", "/*.xml", "/*.txt", "/*.jpg", "/*.jpeg", "/*.png", "/*.svg", "/*.pdf", "/*.ico", "/*.webp"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=(), accelerometer=(), gyroscope=(), magnetometer=()"

[[headers]]
  for = "/brand/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Ghidurile PDF sunt închise: accesibile DOAR prin funcția download-guide (după email).
# Fișierele fizice există în /guides-gated dar accesul HTTP direct e blocat (404 forțat),
# iar funcția le citește din bundle (included_files).
[functions]
  included_files = ["guides-gated/**"]

[[redirects]]
  from = "/guides-gated/*"
  to = "/404.html"
  status = 404
  force = true

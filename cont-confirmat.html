<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Email confirmed · MyHistamate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@500&family=Hanken+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #1A2E3B;
      --coral: #E8603C;
      --teal: #1A8C8A;
      --cream: #F7F4F0;
      --body: #46565F;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Hanken Grotesk', system-ui, sans-serif;
      background: var(--cream);
      color: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border: 1px solid #E5DCCF;
      border-radius: 24px;
      max-width: 420px;
      width: 100%;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(26,46,59,0.06);
    }
    .logo { width: 92px; height: 92px; margin: 0 auto 22px; }
    .check {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(26,140,138,0.12);
      color: #14706E;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.4px;
      padding: 7px 14px;
      border-radius: 999px;
      margin-bottom: 18px;
    }
    h1 {
      font-family: 'Newsreader', Georgia, serif;
      font-weight: 500;
      font-size: 27px;
      letter-spacing: -0.3px;
      margin-bottom: 12px;
    }
    p { font-size: 15px; line-height: 1.6; color: var(--body); margin-bottom: 10px; }
    .ro { font-size: 13.5px; color: #8A949B; margin-top: 4px; }
    .btn {
      display: inline-block;
      background: var(--coral);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      padding: 15px 30px;
      border-radius: 16px;
      margin-top: 24px;
      box-shadow: 0 8px 20px rgba(232,96,60,0.35);
    }
    .hint { font-size: 12.5px; color: #8A949B; margin-top: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="MyHistamate">
      <circle cx="50" cy="50" r="34" fill="none" stroke="#1A2E3B" stroke-width="5" />
      <path d="M 20 52 A 30 30 0 0 0 80 52 Z" fill="#E8603C" />
      <line x1="20" y1="52" x2="80" y2="52" stroke="#1A2E3B" stroke-width="4.5" />
    </svg>

    <div class="check">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#14706E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6" /></svg>
      EMAIL CONFIRMED
    </div>

    <h1>You're all set</h1>
    <p>Your email has been confirmed. You can now open the MyHistamate app and sign in.</p>
    <p class="ro">Emailul a fost confirmat. Deschide aplicația MyHistamate și intră în cont.</p>

    <a class="btn" href="myhistamate://">Open the app</a>

    <p class="hint">If the button doesn't work, just open the MyHistamate app on your phone and log in.</p>
  </div>
</body>
</html>
